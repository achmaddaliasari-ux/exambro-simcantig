name: Build Exambro EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install Dependencies
      run: |
        pip install pywebview pyinstaller
    - name: Build EXE
      run: |
        pyinstaller --noconsole --onefile --name "Exambro_Sekolah" main.py
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Exambro-Windows
        path: dist/Exambro_Sekolah.exe
        
